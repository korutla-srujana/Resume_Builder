<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume PDF</title>
    <style>{{ inline_css|safe }}</style>
</head>
<body class="resume-builder-page pdf-export-page">
{% include 'resume/_icon_sprite.html' %}

<main class="pdf-shell">
    <div class="pdf-stage">
        {% include 'resume/_resume_document.html' %}
    </div>
</main>

<pre id="pdf-link-metadata" aria-hidden="true"></pre>
<script>
function finalizePdfLayout() {
    const shell = document.querySelector('.pdf-shell');
    const stage = document.querySelector('.pdf-stage');
    const sheet = document.querySelector('.resume-sheet');
    const metadataNode = document.getElementById('pdf-link-metadata');
    if (!metadataNode || !shell || !stage || !sheet) {
        return;
    }

    sheet.style.transformOrigin = 'top left';
    sheet.style.transform = 'translateX(0) scale(1)';

    const availableWidth = shell.clientWidth;
    const availableHeight = shell.clientHeight;
    const naturalWidth = sheet.offsetWidth;
    const naturalHeight = sheet.offsetHeight;
    const widthScale = availableWidth / naturalWidth;
    const heightScale = availableHeight / naturalHeight;
    const scale = Math.min(1, widthScale, heightScale);
    const offsetX = Math.max(0, (availableWidth - (naturalWidth * scale)) / 2);

    if (scale < 1) {
        sheet.style.transform = 'translateX(' + offsetX + 'px) scale(' + scale + ')';
    }
    stage.style.height = Math.ceil(naturalHeight * scale) + 'px';

    const shellRect = shell.getBoundingClientRect();
    const links = Array.from(document.querySelectorAll('a[href]'))
        .map(function (anchor) {
            const rect = anchor.getBoundingClientRect();
            return {
                href: anchor.href,
                left: rect.left - shellRect.left,
                top: rect.top - shellRect.top,
                width: rect.width,
                height: rect.height
            };
        })
        .filter(function (link) {
            return link.width > 0 && link.height > 0;
        });

    metadataNode.textContent = JSON.stringify({
        pageWidth: shell.clientWidth,
        pageHeight: shell.clientHeight,
        links: links
    });
    document.body.setAttribute('data-pdf-ready', 'true');
}

window.addEventListener('load', function () {
    window.requestAnimationFrame(function () {
        window.requestAnimationFrame(function () {
            finalizePdfLayout();
        });
    });
});
</script>
</body>
</html>
